<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1200">
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  html,body{width:1200px;height:630px;overflow:hidden}
  @font-face{font-family:'Geist Mono';src:url('https://cdn.jsdelivr.net/npm/geist@1.3.1/dist/fonts/geist-mono/GeistMono-Regular.woff2') format('woff2');font-weight:400;font-display:block}
  body{
    background:#0F0B1A;
    font-family:system-ui,-apple-system,'Segoe UI',sans-serif;
    display:flex;align-items:center;justify-content:center;
    position:relative;
    overflow:hidden;
  }

  /* Background glows */
  .glow-tl{position:absolute;top:-120px;left:-80px;width:600px;height:500px;background:radial-gradient(ellipse,rgba(124,58,237,0.22) 0%,transparent 65%);pointer-events:none}
  .glow-br{position:absolute;bottom:-100px;right:-60px;width:500px;height:400px;background:radial-gradient(ellipse,rgba(236,72,153,0.12) 0%,transparent 65%);pointer-events:none}
  .glow-center{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:700px;height:400px;background:radial-gradient(ellipse,rgba(124,58,237,0.08) 0%,transparent 70%);pointer-events:none}

  /* Subtle grid */
  .grid{position:absolute;inset:0;background-image:linear-gradient(rgba(167,139,250,0.04) 1px,transparent 1px),linear-gradient(90deg,rgba(167,139,250,0.04) 1px,transparent 1px);background-size:60px 60px;pointer-events:none}

  /* Border frame */
  .frame{position:absolute;inset:0;border:1px solid rgba(167,139,250,0.12)}

  .card{
    position:relative;z-index:10;
    width:100%;height:100%;
    padding:72px 80px;
    display:flex;flex-direction:column;
    justify-content:space-between;
  }

  /* Logo */
  .logo{
    display:flex;align-items:center;gap:0;
    font-size:1.375rem;font-weight:800;letter-spacing:-0.03em;
  }
  .logo .my{color:#eeedf2}
  .logo .mdl{color:#A78BFA}
  .logo-dot{width:6px;height:6px;border-radius:50%;background:#A78BFA;margin-left:4px;margin-bottom:12px}

  /* Main copy */
  .main{flex:1;display:flex;flex-direction:column;justify-content:center;padding:24px 0}

  .eyebrow{
    display:inline-flex;align-items:center;gap:8px;
    font-size:0.8125rem;font-weight:700;letter-spacing:0.08em;text-transform:uppercase;
    color:#A78BFA;
    background:rgba(167,139,250,0.1);border:1px solid rgba(167,139,250,0.3);
    border-radius:999px;padding:6px 16px;
    margin-bottom:28px;width:fit-content;
  }
  .eyebrow::before{content:'';width:6px;height:6px;border-radius:50%;background:#A78BFA;display:inline-block}

  h1{
    font-size:4.5rem;font-weight:800;line-height:1.0;letter-spacing:-0.04em;
    color:#eeedf2;
    margin-bottom:24px;
  }
  h1 em{
    font-style:normal;
    background:linear-gradient(135deg,#EC4899 0%,#A78BFA 50%,#7C3AED 100%);
    -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
  }

  .sub{
    font-size:1.375rem;font-weight:400;line-height:1.45;
    color:#b0adc2;
    max-width:680px;
  }
  .sub strong{color:#eeedf2;font-weight:600}

  /* Bottom row */
  .bottom{
    display:flex;align-items:center;justify-content:space-between;
  }

  .pill{
    display:inline-flex;align-items:center;gap:8px;
    background:rgba(167,139,250,0.08);border:1px solid rgba(167,139,250,0.2);
    border-radius:999px;padding:10px 20px;
    font-size:0.875rem;font-weight:600;color:#A78BFA;
  }
  .pill-dot{width:7px;height:7px;border-radius:50%;background:#34D399;box-shadow:0 0 8px rgba(52,211,153,0.6)}

  .url{font-size:0.9375rem;color:#7a7694;font-weight:500;letter-spacing:0.01em}
</style>
</head>
<body>
  <div class="glow-tl"></div>
  <div class="glow-br"></div>
  <div class="glow-center"></div>
  <div class="grid"></div>
  <div class="frame"></div>

  <div class="card">
    <div class="logo">
      <span class="my">my</span><span class="mdl">model</span>
      <div class="logo-dot"></div>
    </div>

    <div class="main">
      <div class="eyebrow">Introducing Your Stats Card</div>
      <h1>Cookies made them billions.<br><em>You got nothing. Until now.</em></h1>
      <p class="sub">The first ever digital persona you <strong>own and monetize.</strong><br>Brands pay you directly — minimum <strong>$5 per offer.</strong></p>
    </div>

    <div class="bottom">
      <div class="pill">
        <div class="pill-dot"></div>
        Join the waitlist — getmymodel.com
      </div>
      <div class="url">getmymodel.com</div>
    </div>
  </div>
</body>
</html>
