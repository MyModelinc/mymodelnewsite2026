<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>myModel Stats Card — Brand View Test</title>
  <link href="https://api.fontshare.com/v2/css?f[]=satoshi@400,500,700,900&display=swap" rel="stylesheet">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
  <style>
    *, *::before, *::after {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: radial-gradient(ellipse at 35% 45%, #2D1B69 0%, #0D0B14 55%, #080610 100%);
      font-family: 'Satoshi', -apple-system, BlinkMacSystemFont, sans-serif;
      overflow: hidden;
    }

    /* Ambient depth orbs */
    .orb {
      position: fixed;
      border-radius: 50%;
      pointer-events: none;
      filter: blur(90px);
    }
    .orb-1 {
      width: 500px;
      height: 500px;
      background: rgba(109, 40, 217, 0.18);
      top: -140px;
      left: -120px;
    }
    .orb-2 {
      width: 380px;
      height: 380px;
      background: rgba(167, 139, 250, 0.10);
      bottom: -100px;
      right: -80px;
    }

    /* ── Card shell ── */
    .card {
      position: relative;
      width: 350px;
      height: 490px;
      border-radius: 18px;
      border: 1px solid #A78BFA;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      cursor: default;
      user-select: none;
    }

    /* Layer 1 – base fill + backdrop blur */
    .layer-bg {
      position: absolute;
      inset: 0;
      background: #231D30;
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
    }

    /* Layer 2 – dot-grid texture */
    .layer-grid {
      position: absolute;
      inset: 0;
      background-image: radial-gradient(circle, rgba(167, 139, 250, 0.07) 1px, transparent 1px);
      background-size: 20px 20px;
      pointer-events: none;
    }

    /* Layer 3 – top violet radial bloom */
    .layer-bloom {
      position: absolute;
      inset: 0;
      background: radial-gradient(ellipse at 50% -10%, rgba(124, 58, 237, 0.22) 0%, transparent 62%);
      pointer-events: none;
    }

    /* Layer 4 – holographic shimmer */
    .layer-shimmer {
      position: absolute;
      inset: 0;
      background: linear-gradient(
        108deg,
        transparent 38%,
        rgba(167, 139, 250, 0.05) 50%,
        transparent 62%
      );
      pointer-events: none;
      animation: shimmer 5s ease-in-out infinite;
    }
    @keyframes shimmer {
      0%,100% { opacity: 0.4; transform: translateX(-8px); }
      50%      { opacity: 1;   transform: translateX(8px);  }
    }

    /* ── Content ── */
    .card-content {
      position: relative;
      z-index: 2;
      display: flex;
      flex-direction: column;
      height: 100%;
      padding: 22px 22px 20px;
    }

    /* Top bar */
    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 18px;
    }

    .wordmark {
      font-family: 'Satoshi', sans-serif;
      font-weight: 900;
      font-size: 12px;
      letter-spacing: 0.16em;
      color: #A78BFA;
      text-transform: uppercase;
    }

    .view-badge {
      display: flex;
      align-items: center;
      gap: 5px;
      background: rgba(124, 58, 237, 0.12);
      border: 1px solid rgba(124, 58, 237, 0.32);
      border-radius: 20px;
      padding: 3px 10px;
      font-size: 9px;
      font-weight: 600;
      color: #A78BFA;
      text-transform: uppercase;
      letter-spacing: 0.11em;
    }

    .badge-pip {
      width: 5px;
      height: 5px;
      border-radius: 50%;
      background: #7C3AED;
      flex-shrink: 0;
    }

    /* Identity */
    .identity {
      margin-bottom: 15px;
    }

    .identity-name {
      font-family: 'Satoshi', sans-serif;
      font-weight: 700;
      font-size: 28px;
      line-height: 1.05;
      color: #F5F3FF;
      margin-bottom: 6px;
    }

    .identity-sub {
      font-family: system-ui, -apple-system, 'SF Pro Text', sans-serif;
      font-weight: 400;
      font-size: 14px;
      color: #EDE9FE;
      opacity: 0.72;
      letter-spacing: 0.01em;
    }

    /* Rule */
    .rule {
      height: 1px;
      background: linear-gradient(90deg, transparent, rgba(167,139,250,0.22) 25%, rgba(167,139,250,0.22) 75%, transparent);
      margin-bottom: 16px;
    }

    /* Match row */
    .match-row {
      display: flex;
      align-items: center;
      gap: 14px;
      margin-bottom: 18px;
    }

    .avatar {
      width: 50px;
      height: 50px;
      border-radius: 13px;
      background: linear-gradient(135deg, #4C1D95 0%, #7C3AED 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Satoshi', sans-serif;
      font-weight: 700;
      font-size: 17px;
      color: #F5F3FF;
      letter-spacing: 0.03em;
      flex-shrink: 0;
      box-shadow: 0 5px 22px rgba(124, 58, 237, 0.48);
    }

    .match-meta {
      display: flex;
      flex-direction: column;
      gap: 2px;
    }

    .match-label {
      font-size: 9px;
      font-weight: 600;
      color: #A78BFA;
      text-transform: uppercase;
      letter-spacing: 0.13em;
    }

    .match-score {
      font-family: 'Satoshi', sans-serif;
      font-weight: 700;
      font-size: 26px;
      color: #F5F3FF;
      line-height: 1;
    }

    .match-type {
      font-size: 10px;
      color: #EDE9FE;
      opacity: 0.52;
    }

    /* Section label */
    .section-label {
      font-size: 9px;
      font-weight: 600;
      color: #7C3AED;
      text-transform: uppercase;
      letter-spacing: 0.16em;
      margin-bottom: 9px;
    }

    /* Pills */
    .pills {
      display: flex;
      flex-direction: column;
      gap: 7px;
    }

    .pill {
      position: relative;
      background: #1A1426;
      border: 1px solid #7C3AED;
      border-radius: 10px;
      padding: 10px 14px 10px 18px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      overflow: hidden;
    }

    /* Left accent stripe */
    .pill::before {
      content: '';
      position: absolute;
      left: 0;
      top: 0;
      bottom: 0;
      width: 3px;
      background: linear-gradient(180deg, #7C3AED 0%, #A78BFA 100%);
    }

    .pill-cat {
      font-size: 9px;
      font-weight: 600;
      color: #A78BFA;
      text-transform: uppercase;
      letter-spacing: 0.11em;
      white-space: nowrap;
      flex-shrink: 0;
    }

    .pill-val {
      font-family: system-ui, -apple-system, 'SF Pro Text', sans-serif;
      font-weight: 600;
      font-size: 14px;
      color: #F5F3FF;
      text-align: right;
      line-height: 1.1;
      white-space: nowrap;
    }

    /* Status bar */
    .status-bar {
      margin-top: auto;
      padding-top: 14px;
      padding-top: 14px;
      border-top: 1px solid rgba(167, 139, 250, 0.12);
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .status-left {
      display: flex;
      align-items: center;
      gap: 9px;
    }

    .dot-wrap {
      position: relative;
      width: 18px;
      height: 18px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }

    .dot-core {
      width: 9px;
      height: 9px;
      border-radius: 50%;
      background: #34D399;
      box-shadow: 0 0 7px rgba(52, 211, 153, 0.8);
      position: relative;
      z-index: 1;
      flex-shrink: 0;
    }

    .dot-ring {
      position: absolute;
      width: 18px;
      height: 18px;
      border-radius: 50%;
      border: 1px solid rgba(52, 211, 153, 0.45);
    }

    .status-text {
      font-family: system-ui, -apple-system, 'SF Pro Text', sans-serif;
      font-weight: 600;
      font-size: 10.5px;
      color: #34D399;
      letter-spacing: 0.02em;
    }

    .card-num {
      font-size: 9px;
      color: #EDE9FE;
      opacity: 0.28;
      letter-spacing: 0.07em;
    }
  </style>
</head>
<body>

  <div class="orb orb-1"></div>
  <div class="orb orb-2"></div>

  <div class="card" id="card">
    <!-- Background layers -->
    <div class="layer-bg"></div>
    <div class="layer-grid"></div>
    <div class="layer-bloom"></div>
    <div class="layer-shimmer"></div>

    <!-- Content -->
    <div class="card-content">

      <!-- Top bar -->
      <div class="topbar">
        <span class="wordmark">myModel</span>
        <div class="view-badge">
          <div class="badge-pip"></div>
          Brand View
        </div>
      </div>

      <!-- Identity block -->
      <div class="identity">
        <div class="identity-name">Mara Okafor</div>
        <div class="identity-sub">Brooklyn, NY &nbsp;·&nbsp; 27 &nbsp;·&nbsp; UX Designer</div>
      </div>

      <div class="rule"></div>

      <!-- Match confidence row -->
      <div class="match-row">
        <div class="avatar">MO</div>
        <div class="match-meta">
          <span class="match-label">Match Confidence</span>
          <span class="match-score">98.4%</span>
          <span class="match-type">Deterministic &nbsp;·&nbsp; 1:1 Individual</span>
        </div>
      </div>

      <!-- Commercial portrait -->
      <div class="section-label">Commercial Portrait</div>
      <div class="pills">
        <div class="pill">
          <span class="pill-cat">Style</span>
          <span class="pill-val">Minimalist · Bold Choices</span>
        </div>
        <div class="pill">
          <span class="pill-cat">Brand Loyalty</span>
          <span class="pill-val">Independent Brands Only</span>
        </div>
        <div class="pill">
          <span class="pill-cat">Recent Spend</span>
          <span class="pill-val">$240 at Aritzia</span>
        </div>
      </div>

      <!-- Status bar -->
      <div class="status-bar">
        <div class="status-left">
          <div class="dot-wrap">
            <div class="dot-core" id="dotCore"></div>
            <div class="dot-ring" id="dotRing"></div>
          </div>
          <span class="status-text">Verified Deterministic Match</span>
        </div>
        <span class="card-num">#0042 / 1,000</span>
      </div>

    </div>
  </div>

  <script>
    // ── Card border breathing glow ──────────────────────────────────────────
    gsap.set("#card", {
      boxShadow: "0 0 18px rgba(167,139,250,0.25), 0 0 50px rgba(167,139,250,0.08), 0 24px 64px rgba(0,0,0,0.65)"
    });

    gsap.to("#card", {
      boxShadow: "0 0 38px rgba(167,139,250,0.55), 0 0 90px rgba(167,139,250,0.20), 0 24px 64px rgba(0,0,0,0.65)",
      duration: 2.6,
      ease: "power1.inOut",
      yoyo: true,
      repeat: -1
    });

    // ── Subtle card float ───────────────────────────────────────────────────
    gsap.to("#card", {
      y: -5,
      duration: 3.2,
      ease: "sine.inOut",
      yoyo: true,
      repeat: -1
    });

    // ── Green dot core pulse ────────────────────────────────────────────────
    gsap.to("#dotCore", {
      boxShadow: "0 0 16px rgba(52,211,153,1), 0 0 30px rgba(52,211,153,0.55)",
      duration: 1.4,
      ease: "power1.inOut",
      yoyo: true,
      repeat: -1
    });

    // ── Green dot ring expand ───────────────────────────────────────────────
    gsap.fromTo("#dotRing",
      { scale: 0.6, opacity: 0.7 },
      {
        scale: 2.0,
        opacity: 0,
        duration: 1.6,
        ease: "power2.out",
        repeat: -1,
        transformOrigin: "center center"
      }
    );
  </script>

</body>
</html>
